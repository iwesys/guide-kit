# guide-kit default content policy (WP-483 Ф1).
#
# required_attribution_slots: что обязано иметь честный источник в decision_log,
# иначе adapter.py hard-fail'ит вместо того, чтобы молча выдать пустой/выдуманный
# результат. accepted_methods — какие extraction_method покрывают слот.
#
# llm_assisted_confidence — КОНСТАНТА, которую задаёт автор policy. adapter.py
# её не вычисляет и не берёт из самооценки LLM (пир-сессия WP-483 Ф1, ход 3-4:
# самооценка LLM превращает hard-fail в декорацию).
#
# Оба required-слота ниже разрешают llm-assisted по умолчанию — иначе портативный
# профиль без курикулы (Марина/Дэвид, WP-289 §4) гарантированно fail'ил бы каждый
# прогон, и «честный пробел» превращался бы в «нерабочий продукт».

required_attribution_slots:
  - slot: narrative
    accepted_methods: [direct, derived, llm-assisted]
    llm_assisted_confidence: 0.4
  - slot: plan_day.element_choice
    accepted_methods: [direct, derived, llm-assisted]
    llm_assisted_confidence: 0.3

optional_attribution_slots: ["*"]
